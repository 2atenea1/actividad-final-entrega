# ============================================================
# Docker Compose — Prueba Local
# Todos los microservicios corren en contenedores locales
# Las bases de datos apuntan a la nube (Railway/Supabase/MongoDB Atlas)
# ============================================================

services:

  # ── 1. Pokemon Service (Node.js + MySQL) ─────────────────
  pokemon-service:
    build: ./pokemon-service
    container_name: pokemon-service
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=${POKEMON_DB_HOST}
      - DB_PORT=${POKEMON_DB_PORT:-3306}
      - DB_USER=${POKEMON_DB_USER}
      - DB_PASSWORD=${POKEMON_DB_PASSWORD}
      - DB_NAME=${POKEMON_DB_NAME:-pokemon_db}
      - DB_SSL=true
      - PORT=3001
    networks:
      - app-network
    restart: unless-stopped

  # ── 2. Naruto Service (Java + PostgreSQL) ────────────────
  naruto-service:
    build: ./naruto-service
    container_name: naruto-service
    ports:
      - "3002:3002"
    environment:
      - DATABASE_URL=${NARUTO_DATABASE_URL}
      - PORT=3002
    networks:
      - app-network
    restart: unless-stopped

  # ── 3. Dragon Ball Service (Python + MongoDB) ────────────
  dragonball-service:
    build: ./dragonball-service
    container_name: dragonball-service
    ports:
      - "3003:3003"
    environment:
      - MONGODB_URI=${DRAGONBALL_MONGODB_URI}
      - MONGODB_DB=${DRAGONBALL_MONGODB_DB:-dragonball_db}
      - PORT=3003
    networks:
      - app-network
    restart: unless-stopped

  # ── 4. Frontend (Nginx) ──────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
